name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Build & Test (Swift Package library targets) ───────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
          swift --version

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build (debug)
        run: swift build

      - name: Test
        run: swift test --parallel

  # ── SwiftLint ─────────────────────────────────────────────────────────────
  lint:
    name: SwiftLint
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint --reporter github-actions-logging

  # ── Release build (on tags) ───────────────────────────────────────────────
  release-build:
    name: Release Build (Xcode)
    runs-on: macos-14
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-and-test, lint]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"

      - name: Build archive
        run: |
          xcodebuild archive \
            -project Reticle.xcodeproj \
            -scheme Reticle \
            -configuration Release \
            -archivePath build/Reticle.xcarchive \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO \
            | xcpretty
        # Note: real releases require signing. This is a build-only smoke test.
        # Notarization is handled separately via Fastlane / manual workflow.
        continue-on-error: true
